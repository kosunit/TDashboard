<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Домашка US Stocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#131920;--bg3:#1a2332;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e8f0;--text2:#7a8fa6;--text3:#3a5068;
  --blue:#4a8fd4;--blue2:#2d6aad;
  --green:#3ea96e;--red:#e05555;--gold:#d4a017;--purple:#8b6be8;
  --mono:'JetBrains Mono',monospace;--sans:'Onest',sans-serif;
  --sb:230px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
.app{display:flex;height:100vh;flex-direction:column}

/* topbar */
.topbar{display:flex;align-items:center;gap:16px;padding:0 20px;height:44px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg2)}
.tb-title{font-size:13px;font-weight:600;letter-spacing:.04em}
.tb-date{font-size:11px;color:var(--text2);font-family:var(--mono)}
.tb-count{font-size:11px;color:var(--text2);font-family:var(--mono);margin-left:auto}

/* filters */
.fbar{display:flex;align-items:center;gap:6px;padding:0 16px;height:34px;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto}
.fbar::-webkit-scrollbar{display:none}
.fb{padding:2px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:var(--sans);font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s}
.fb:hover{border-color:var(--border2);color:var(--text)}
.fb.on{background:var(--blue2);border-color:var(--blue);color:#fff}

/* debug */
#dbg{display:none;padding:4px 20px;font-size:10px;font-family:var(--mono);color:#e8b83a;background:#1a1100;border-bottom:1px solid #3a2600;flex-shrink:0}

/* body */
.body{display:flex;flex:1;overflow:hidden}

/* nav */
.nav{width:185px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.nav-list{flex:1;overflow-y:auto}
.nav-list::-webkit-scrollbar{width:3px}
.nav-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav-add{padding:8px 10px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.nav-add-row{display:flex;gap:5px;align-items:center}
.nav-add-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px;border-radius:4px;outline:none;text-transform:uppercase;width:0}
.nav-add-inp::placeholder{color:var(--text3);text-transform:none}
.nav-add-inp:focus{border-color:var(--blue)}
.nav-add-btn{background:var(--blue2);border:1px solid var(--blue);color:#fff;font-size:13px;width:26px;height:26px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.nav-add-btn:hover{background:#3a7dc4}
.nav-add-err{font-size:10px;color:var(--red);margin-top:4px;font-family:var(--mono);min-height:14px}
.ni{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 8px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;gap:4px}
.ni:hover{background:var(--bg3)}
.ni:hover .ni-del{opacity:1}
.ni.on{background:var(--bg3);border-left:2px solid var(--blue);padding-left:10px}
.ni-t{font-size:13px;font-weight:600;font-family:var(--mono)}
.ni-s{font-size:9px;color:var(--text2);margin-top:1px}
.ni-del{opacity:0;background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;transition:opacity .15s,color .1s;flex-shrink:0}
.ni-del:hover{color:var(--red)}
.cH{color:var(--green)}.cL{color:var(--red)}.cP{color:var(--gold)}.cLim{color:var(--purple)}

/* card */
.card-area{flex:1;min-width:0;display:flex;overflow:hidden}
.no-card{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px}

/* sidebar */
.sb{width:var(--sb);flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg2)}
.sb::-webkit-scrollbar{width:3px}
.sb::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sb-head{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.sb-tr{display:flex;align-items:baseline;gap:7px;margin-bottom:2px}
.sb-tk{font-size:20px;font-weight:600;font-family:var(--mono)}
.sb-cp{font-size:18px;font-weight:500;font-family:var(--mono);color:var(--blue)}
.sb-cl{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}

.sb-sec{padding:9px 14px;border-bottom:1px solid var(--border)}
.st{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text2);text-transform:uppercase;margin-bottom:6px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:2.5px 0;gap:4px}
.sl{font-size:12px;color:var(--text2);flex-shrink:0}
.sv{font-size:13px;font-weight:500;font-family:var(--mono);color:#dde6f0;text-align:right}
.sv.b{color:#6ab4f5}.sv.g{color:var(--gold)}

/* market phase block */
.mkt-block{padding:10px 14px;border-bottom:1px solid var(--border)}
.mkt-phase{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.mkt-icon{font-size:14px}
.mkt-label{font-size:13px;font-weight:600}
.mkt-sub{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.4}
.mkt-bar{position:relative;height:6px;background:var(--bg3);border-radius:3px;margin-bottom:6px;overflow:visible}
.mkt-seg{position:absolute;top:0;height:100%;border-radius:3px}
.mkt-cursor{position:absolute;top:-3px;width:3px;height:12px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.mkt-ticks{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
.mkt-hours{display:flex;flex-direction:column;gap:3px}
.mkt-row{display:flex;align-items:center;gap:6px;font-size:11px}
.mkt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mkt-rname{color:var(--text2);width:72px}
.mkt-rtime{color:var(--text);font-family:var(--mono);font-size:10px}

/* editable input — same font as .sv */
.inp{background:transparent;border:none;border-bottom:1px solid transparent;color:#dde6f0;font-size:13px;font-weight:500;font-family:var(--mono);text-align:right;padding:1px 2px;width:100%;max-width:130px;outline:none;transition:border-color .15s;cursor:text;direction:ltr}
.inp:hover{border-bottom-color:var(--border2)}
.inp:focus{border-bottom-color:var(--blue);color:var(--blue)}

.sb-ft{padding:12px 14px;display:flex;gap:20px;margin-top:auto;border-top:1px solid var(--border);flex-wrap:wrap}
.ft-i{display:flex;align-items:center;gap:7px}
.ft-d{width:10px;height:3px;border-radius:2px}
.ft-l{font-size:17px;font-weight:600;font-family:var(--mono)}
.ft-p{font-size:17px;font-weight:500;color:#dde6f0;font-family:var(--mono)}

/* charts */
.charts{flex:1;min-width:0;display:flex;flex-direction:column;background:#0d1117}
.c-d1{flex:2.2;position:relative;border-bottom:1px solid var(--border);overflow:hidden}
.c-bot{display:flex;flex:1;overflow:hidden}
.c-h1,.c-m5{flex:1;position:relative;overflow:hidden}
.c-h1{border-right:1px solid var(--border)}
canvas{position:absolute;inset:0;display:block;cursor:default}
.clbl{position:absolute;top:5px;left:7px;font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text2);z-index:2;pointer-events:none;letter-spacing:.05em}
.cov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(160,175,190,0.4);font-family:var(--mono);z-index:3;background:#141c28}
/* custom colored dropdown */
.dd-wrap{position:relative;width:100%;max-width:140px}
.dd-sel{display:flex;align-items:center;justify-content:space-between;gap:4px;cursor:pointer;padding:2px 4px;border-radius:3px;border:1px solid var(--border2);background:var(--bg3);transition:border-color .15s}
.dd-sel:hover{border-color:var(--blue)}
.dd-val{font-size:11px;font-weight:500;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.dd-arr{font-size:9px;color:var(--text2);flex-shrink:0;transition:transform .15s}
.dd-wrap.open .dd-arr{transform:rotate(180deg)}
.dd-list{display:none;position:absolute;right:0;top:calc(100% + 3px);background:var(--bg3);border:1px solid var(--border2);border-radius:4px;z-index:50;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.dd-wrap.open .dd-list{display:block}
.dd-opt{font-size:11px;font-weight:500;font-family:var(--mono);padding:6px 10px;cursor:pointer;transition:background .1s;white-space:nowrap}
.dd-opt:hover{background:var(--bg2)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="tb-title">ДОМАШКА &nbsp;&nbsp;&nbsp; US STOCKS</div>
    <div class="tb-date" id="tb-date"></div>
    <div class="tb-count" id="tb-count"></div>
  </div>
  <div class="fbar" id="fbar"></div>
  <div class="body">
    <div class="nav">
      <div class="nav-list" id="nav-list"></div>
      <div class="nav-add">
        <div class="nav-add-row">
          <input class="nav-add-inp" id="nav-inp" placeholder="тикер (AAPL)" maxlength="10"
            onkeydown="if(event.key==='Enter')addTicker()"
            oninput="this.value=this.value.toUpperCase();document.getElementById('nav-err').textContent=''">
          <button class="nav-add-btn" onclick="addTicker()" title="Добавить">+</button>
        </div>
        <div class="nav-add-err" id="nav-err"></div>
      </div>
    </div>
    <div class="card-area" id="card-area"><div class="no-card">Выберите инструмент</div></div>
  </div>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────
const UP = '#3ea96e', DN = '#e05555', LVL_C = '#4a8fd4';

const DEFAULT_TICKERS = ['ARWR','BC','BLD'];

const LVL_TYPES = ['Излом тренда High','Излом тренда Low','Парабар High','Парабар Low','Лимитник High','Лимитник Low'];
const CRITERIA  = ['Возврат к уровню','Возврат к уровню парабара','Поджатие и ЛП последним баром','Без поджатия'];

// ─── PERSIST: save/load tickers + user fields ─────────────
function saveState(){
  try{
    localStorage.setItem('app_tickers', JSON.stringify(TICKERS.map(x=>x.t)));
    localStorage.setItem('app_u', JSON.stringify(U));
  }catch(e){}
}

function loadState(){
  try{
    const savedT = JSON.parse(localStorage.getItem('app_tickers') || 'null');
    const savedU = JSON.parse(localStorage.getItem('app_u')       || 'null');
    const tList  = (savedT && savedT.length) ? savedT : DEFAULT_TICKERS;
    tList.forEach(t => {
      if(!TICKERS.find(x=>x.t===t)) TICKERS.push({t});
      U[t] = (savedU && savedU[t])
        ? savedU[t]
        : {levelPrice:'', levelType:'Излом тренда High', criteria:'Возврат к уровню'};
    });
  }catch(e){
    DEFAULT_TICKERS.forEach(t => {
      TICKERS.push({t});
      U[t] = {levelPrice:'', levelType:'Излом тренда High', criteria:'Возврат к уровню'};
    });
  }
}

// mutable — populated by loadState()
const TICKERS = [];
const U = {};
loadState();

// Per-ticker API results
const D = {};

let activeFil = 'Все', activeIdx = 0;

// ─── UTILS ────────────────────────────────────────────────
const toYMD = d => d.toISOString().slice(0,10);
const dAgo  = n => { const d=new Date(); d.setDate(d.getDate()-n); return toYMD(d); };
const TODAY = toYMD(new Date());
const pad   = n => String(n).padStart(2,'0');
const fmtN  = n => Number(n).toLocaleString('ru-RU');

function todayStr(){
  const d=new Date();
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
}
function tsToStr(ts, mode){
  // ts is milliseconds from Date.getTime() — TD datetimes parsed as local
  const d = new Date(ts);
  if(mode==='d') return pad(d.getDate())+'.'+pad(d.getMonth()+1);
  if(mode==='h') return pad(d.getHours())+':00';
  return pad(d.getHours())+':'+pad(d.getMinutes());
}
function fmtDateFull(ts){
  const d=new Date(ts);
  return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear();
}
function isOpen(){
  const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  if(et.getDay()===0||et.getDay()===6) return false;
  const m=et.getHours()*60+et.getMinutes();
  return m>=570 && m<960;
}
function tClass(type){
  if(!type) return 'H';
  if(type.includes('High')&&type.includes('Излом')) return 'H';
  if(type.includes('Low') &&type.includes('Излом')) return 'L';
  if(type.includes('Парабар'))  return 'P';
  if(type.includes('Лимитник')) return 'Lim';
  return 'H';
}
function dbg(m){ const e=document.getElementById('dbg'); e.textContent=m; e.style.display='block'; }
function dbgHide(){ setTimeout(()=>document.getElementById('dbg').style.display='none', 4000); }
function clrOv(id){ const e=document.getElementById(id); if(e) e.style.display='none'; }
function setOv(id,m){ const e=document.getElementById(id); if(e){ e.textContent=m; e.style.display='flex'; } }

// ─── API: TWELVE DATA (direct) ───────────────────────────
const TD_KEY  = '503b2dad156042a2a5802d9f0ea89c5c';
const TD_BASE = 'https://api.twelvedata.com';
const cache   = {};

const CACHE_TTL = {
  price:   60  * 1000,           // 1 min
  bars1d:  60  * 60  * 1000,    // 1 hour
  bars1h:  15  * 60  * 1000,    // 15 min
  bars5m:  5   * 60  * 1000,    // 5 min
  profile: 24  * 60  * 60 * 1000 // 24 hours
};

// localStorage cache with TTL
function lsGet(key){ try{ const r=localStorage.getItem('td_'+key); if(!r)return null; return JSON.parse(r); }catch(e){ return null; } }
function lsSet(key, data, ttl){ try{ localStorage.setItem('td_'+key, JSON.stringify({ts:Date.now()+ttl, data})); }catch(e){} }
function lsValid(key){ const r=lsGet(key); return r&&Date.now()<r.ts?r.data:null; }

async function tdFetch(endpoint, params){
  const qs = Object.entries({...params, apikey: TD_KEY}).map(([k,v])=>`${k}=${v}`).join('&');
  const url = `${TD_BASE}/${endpoint}?${qs}`;
  try{
    const r = await fetch(url);
    const j = await r.json();
    if(j.status==='error'||j.code){ dbg(`TD [${endpoint}]: ${j.message}`); return null; }
    return j;
  }catch(e){ dbg(`fetch error [${endpoint}]: ${e.message}`); return null; }
}

// Candle bars — returns [{t,o,h,l,c,v}] oldest→newest
async function fetchBars(ticker, interval, outputsize){
  const ttl = interval==='1day'?CACHE_TTL.bars1d : interval==='1h'?CACHE_TTL.bars1h : CACHE_TTL.bars5m;
  const key  = `bars|${ticker}|${interval}|${outputsize}`;
  if(cache[key]) return cache[key];
  const stored = lsValid(key);
  if(stored){ cache[key]=stored; return stored; }

  const j = await tdFetch('time_series', {symbol:ticker, interval, outputsize});
  if(!j?.values) return [];
  const bars = j.values.slice().reverse().map(v=>({
    t: new Date(v.datetime).getTime(),
    o: parseFloat(v.open),  h: parseFloat(v.high),
    l: parseFloat(v.low),   c: parseFloat(v.close),
    v: parseFloat(v.volume||0)
  }));
  cache[key]=bars; lsSet(key, bars, ttl);
  return bars;
}

// Quote — gives current price + is_market_open + previous_close
async function fetchQuote(ticker){
  const key = `quote|${ticker}`;
  if(cache[key]) return cache[key];
  const stored = lsValid(key);
  if(stored){ cache[key]=stored; return stored; }

  const j = await tdFetch('quote', {symbol:ticker});
  if(!j) return null;
  const result = {
    price:         parseFloat(j.close || 0),
    previousClose: parseFloat(j.previous_close || 0),
    isOpen:        j.is_market_open === true || j.is_market_open === 'true',
    change:        parseFloat(j.change || 0),
    changePct:     parseFloat(j.percent_change || 0),
  };
  cache[key]=result; lsSet(key, result, CACHE_TTL.price);
  return result;
}

// Profile — sector, industry, name
async function fetchProfile(ticker){
  const key = `profile|${ticker}`;
  if(cache[key]) return cache[key];
  const stored = lsValid(key);
  if(stored){ cache[key]=stored; return stored; }

  const j = await tdFetch('profile', {symbol:ticker});
  if(!j) return {sector:'—', industry:'—', name:ticker};
  const result = {sector: j.sector||'—', industry: j.industry||'—', name: j.name||ticker};
  cache[key]=result; lsSet(key, result, CACHE_TTL.profile);
  return result;
}

function calcATR(bars, n=5){
  if(bars.length < 2) return 0;

  // Step 1: compute TR for all bars
  const allTR = [];
  for(let i=1; i<bars.length; i++){
    const tr = Math.max(
      bars[i].h - bars[i].l,
      Math.abs(bars[i].h - bars[i-1].c),
      Math.abs(bars[i].l - bars[i-1].c)
    );
    allTR.push({tr, i});
  }

  // Step 2: collect last n clean (non-paranormal) TRs
  // A bar is paranormal if its TR > 2 * avg TR of previous 20 bars
  const clean = [];
  for(let k = allTR.length-1; k >= 0 && clean.length < n; k--){
    const {tr, i} = allTR[k];
    // avg TR of up to 20 bars before this one
    const prev20 = allTR.slice(Math.max(0, k-20), k).map(x=>x.tr);
    if(prev20.length === 0){ clean.push(tr); continue; }
    const avgPrev = prev20.reduce((a,b)=>a+b,0) / prev20.length;
    const isParanormal = tr > 2 * avgPrev;
    if(!isParanormal) clean.push(tr);
    // if paranormal — skip and move to previous bar (loop continues)
  }

  if(clean.length === 0) return 0;
  return clean.reduce((a,b)=>a+b,0) / clean.length;
}

async function loadTicker(ticker){
  if(D[ticker]) return D[ticker];

  const [d1, m5, spyD1, quote, profile] = await Promise.all([
    fetchBars(ticker, '1day', 70),
    fetchBars(ticker, '5min', 100),
    fetchBars('SPY',  '1day', 70),
    fetchQuote(ticker),
    fetchProfile(ticker),
  ]);

  const atrD1 = calcATR(d1, 5);
  const atrM5 = calcATR(m5, 5);

  const lastBar   = d1.length ? d1[d1.length-1] : null;
  const prevDate  = lastBar ? fmtDateFull(lastBar.t) : '';

  // TD quote: is_market_open tells us exactly if market is open right now
  const isOpen    = quote?.isOpen || false;
  const prevClose = quote?.previousClose || (lastBar?.c || 0);
  const curPrice  = isOpen ? (quote?.price || prevClose) : prevClose;

  const avgVolD1  = d1.length ? Math.round(d1.slice(-20).reduce((a,b)=>a+b.v,0)/Math.min(20,d1.length)) : 0;
  const lastVolM5 = m5.length ? Math.round(m5[m5.length-1].v) : 0;

  D[ticker] = {curPrice, prevClose, prevDate, atrD1, atrM5, avgVolD1, lastVolM5,
               d1, m5, spyD1, isOpen,
               sector:profile.sector, industry:profile.industry, name:profile.name};
  return D[ticker];
}

// ─── H1 ───────────────────────────────────────────────────
function h1BarsNeeded(){
  const area = document.getElementById('card-area');
  if(!area) return 100;
  const halfW = Math.max(200, Math.floor((area.clientWidth-230-56)/2));
  return Math.min(500, Math.ceil(halfW/3));
}
async function loadH1(ticker){ return fetchBars(ticker, '1h', 33); }
async function loadSpyH1(){     return fetchBars('SPY',  '1h', 33); }

// ─── CLOSE TO LEVEL calc ──────────────────────────────────
function closeToLevel(ticker){
  const d=D[ticker], u=U[ticker];
  if(!d||!u.levelPrice||!d.atrD1) return '—';
  const lp=parseFloat(u.levelPrice);
  if(isNaN(lp)) return '—';
  const pct = ((Math.abs(d.curPrice-lp)/d.atrD1)*100).toFixed(1);
  return `${pct}% ATR`;
}

// ─── SPY normalise ────────────────────────────────────────
function normSpy(spy, target){
  if(!spy||!spy.length||!target||!target.length) return null;
  const n = Math.min(spy.length, target.length);
  const cl = spy.slice(-n).map(b=>b.c);
  const mn=Math.min(...cl), mx=Math.max(...cl);
  if(mx===mn) return cl.map(()=>0.5);
  return cl.map(v=>(v-mn)/(mx-mn));
}

// ─── FILTERS ──────────────────────────────────────────────
function filtered(){
  if(activeFil==='Все') return TICKERS;
  return TICKERS.filter(({t})=>U[t].levelType===activeFil);
}

function buildFbar(){
  const types = ['Все', ...LVL_TYPES];
  document.getElementById('fbar').innerHTML = types.map(f=>

function buildNav(){

// ─── ADD / REMOVE TICKER ──────────────────────────────────
async function addTicker(){
  const inp = document.getElementById('nav-inp');
  const err = document.getElementById('nav-err');
  const t   = inp.value.trim().toUpperCase();
  if(!t){ err.textContent='Введите тикер'; return; }
  if(TICKERS.find(x=>x.t===t)){ err.textContent='Уже добавлен'; return; }

  err.textContent='Загрузка…';
  inp.disabled = true;

  // Try to load — if no data comes back, reject
  const data = await loadTicker(t);
  inp.disabled = false;

  if(!data || (!data.d1?.length && !data.prevClose)){
    err.textContent='Тикер не найден';
    delete D[t];
    return;
  }

  TICKERS.push({t});
  U[t] = {levelPrice:'', levelType:'Излом тренда High', criteria:'Возврат к уровню'};
  inp.value = '';
  err.textContent = '';
  saveState();
  activeIdx = filtered().length - 1;
  buildFbar();
  buildNav();
  selectItem(activeIdx);
}

function removeTicker(t){
  const idx = TICKERS.findIndex(x=>x.t===t);
  if(idx === -1) return;
  TICKERS.splice(idx, 1);
  delete U[t];
  saveState();
  if(activeIdx >= filtered().length) activeIdx = Math.max(0, filtered().length-1);
  buildFbar();
  buildNav();
  const cur = filtered()[activeIdx];
  if(cur) selectItem(activeIdx);
  else document.getElementById('card-area').innerHTML='<div class="no-card">Выберите инструмент</div>';
}

async function loadAndRender(ticker){
  if(!D[ticker]){
    await loadTicker(ticker);
    patchSidebar(ticker);
    buildNav();
  }
  const d = D[ticker];
  if(!d) return;

  // SPY footer
  if(d.spyD1 && d.spyD1.length){
    const el=document.getElementById('ft-s');
    if(el) el.textContent = d.spyD1[d.spyD1.length-1].c.toFixed(2);
  }

  // Load H1 in parallel with SPY H1
  const [h1, spyH1] = await Promise.all([loadH1(ticker), loadSpyH1()]);

  renderCharts(ticker, h1, spyH1);

  dbg(`${ticker} D1=${d.d1.length} H1=${h1.length} M5=${d.m5.length} | ATR D1=${d.atrD1.toFixed(2)} M5=${d.atrM5.toFixed(2)}`);
  dbgHide();
}

function renderCharts(ticker, h1Bars, spyH1){
  const d = D[ticker];
  const lvl = parseFloat(U[ticker].levelPrice) || null;

  // D1
  if(d && d.d1 && d.d1.length){
    const labels = d.d1.map(b=>tsToStr(b.t,'d'));
    const meta = drawChart('c-d1','cw-d1', d.d1, lvl, normSpy(d.spyD1, d.d1), labels);
    clrOv('ov-d1');
    if(meta) attachDrag('c-d1', ticker, meta, d.d1, normSpy(d.spyD1,d.d1), labels);
  } else {
    setOv('ov-d1','Нет D1 данных');
  }

  // H1
  if(h1Bars && h1Bars.length){
    const labels = h1Bars.map(b=>tsToStr(b.t,'h'));
    drawChart('c-h1','cw-h1', h1Bars, lvl, normSpy(spyH1, h1Bars), labels);
    clrOv('ov-h1');
  } else if(h1Bars !== undefined){
    setOv('ov-h1','Нет H1 данных');
  }

  // M5
  if(d && d.m5 && d.m5.length){
    const labels = d.m5.map(b=>tsToStr(b.t,'m'));
    drawChart('c-m5','cw-m5', d.m5, lvl, null, labels);
    clrOv('ov-m5');
  } else if(d){
    setOv('ov-m5','Нет M5 данных');
  }
}

// ─── DRAW CHART ───────────────────────────────────────────
function drawChart(cid, wid, candles, level, spyNorm, labels){
  const canvas = document.getElementById(cid);
  const wrap   = document.getElementById(wid);
  if(!canvas||!wrap||!candles.length) return null;
  const W=wrap.clientWidth, H=wrap.clientHeight;
  if(!W||!H) return null;
  const DPR = Math.min(window.devicePixelRatio||1,2);
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR,DPR);

  const compact = H<230;
  const GRID='rgba(255,255,255,0.09)', AX='rgba(210,225,240,0.9)';
  const FSZ = compact?9:11;
  const LBH = compact?30:36;
  const PL=4,PR=60,PT=compact?12:16,PB=LBH;
  const VOL_H_FRAC = 0.18;
  const cw=W-PL-PR, ch=H-PT-PB, pH=ch;

  ctx.fillStyle='#141c28'; ctx.fillRect(0,0,W,H);

  // price range
  const hs=candles.map(c=>c.h), ls=candles.map(c=>c.l);
  if(level!=null){hs.push(level);ls.push(level)}
  let hi=Math.max(...hs), lo=Math.min(...ls);
  const rng=hi-lo; hi+=rng*0.08; lo-=rng*0.06;
  const py  = v  => PT+pH-(v-lo)/(hi-lo)*pH;
  const pyInv = y => lo + (1-(y-PT)/pH)*(hi-lo); // pixel → price

  // Choose a nice tick step so labels don't overlap
  // Target ~8-12 ticks for D1, fewer for compact
  const targetTicks = compact ? 5 : 10;
  const rawStep = (hi-lo) / targetTicks;
  // Round step to nearest nice value: 0.10, 0.20, 0.50, 1, 2, 5, 10...
  const magnitude = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const niceSteps = [0.1,0.2,0.25,0.5,1,2,2.5,5,10,20,25,50,100];
  const normalised = rawStep / magnitude;
  const niceMult = niceSteps.find(s => s >= normalised) || niceSteps[niceSteps.length-1];
  const step = niceMult * magnitude;

  // Start from a round multiple of step
  const firstTick = Math.ceil(lo / step) * step;

  ctx.font=`${FSZ}px JetBrains Mono,monospace`;
  ctx.textAlign='left';

  for(let v = firstTick; v <= hi; v += step){
    const y = py(v);
    if(y < PT || y > PT+pH) continue;
    ctx.strokeStyle=GRID; ctx.lineWidth=0.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(PL+cw,y); ctx.stroke();
    ctx.fillStyle=AX;
    ctx.fillText(v.toFixed(2), PL+cw+3, y+3.5);
    // fix floating point drift
    v = Math.round(v * 10000) / 10000;
  }

  // SPY line (grey, behind candles)
  if(spyNorm && spyNorm.length){
    const n2=Math.min(spyNorm.length,candles.length);
    const sLo=lo+rng*0.04, sHi=lo+rng*0.90;
    const sw=cw/candles.length, off=candles.length-n2;
    ctx.strokeStyle='rgba(180,195,215,0.55)';
    ctx.lineWidth=1; ctx.setLineDash([]);
    ctx.beginPath();
    spyNorm.forEach((v,i)=>{
      const x=PL+(off+i)*sw+sw/2;
      const y=PT+pH-(v*(sHi-sLo)+sLo-lo)/(hi-lo)*pH;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }

  // level line — thicker for easier drag
  if(level!=null){
    const ly=py(level);
    // subtle grab-zone glow
    ctx.strokeStyle='rgba(74,143,212,0.15)'; ctx.lineWidth=10; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(PL,ly); ctx.lineTo(PL+cw,ly); ctx.stroke();
    // main line
    ctx.strokeStyle=LVL_C; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(PL,ly); ctx.lineTo(PL+cw,ly); ctx.stroke();
    ctx.fillStyle=LVL_C;
    ctx.font=`bold ${FSZ}px JetBrains Mono,monospace`;
    ctx.textAlign='left';
    ctx.fillText(level.toFixed(2), PL+cw+3, ly+3.5);
  }

  // candles + volume (volume rendered inside chart area, bottom 18%)
  const n=candles.length, sw=cw/n;
  const bw=Math.max(1, sw*0.55);
  const maxV=Math.max(...candles.map(c=>c.v));
  const volAreaH = pH * VOL_H_FRAC;  // pixels for volume
  const volBase  = PT + pH;           // bottom of price area

  candles.forEach((c,i)=>{
    const x=PL+i*sw+sw/2;
    const col=c.c>=c.o?UP:DN;

    // Volume bar — inside chart, bottom-aligned, lighter color
    const vh = (c.v/maxV) * volAreaH;
    ctx.fillStyle = c.c>=c.o ? 'rgba(62,169,110,0.25)' : 'rgba(224,85,85,0.25)';
    ctx.fillRect(x-bw/2, volBase-vh, bw, vh);

    // Candle wick
    ctx.strokeStyle=col; ctx.lineWidth=Math.max(0.6,sw*0.07); ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x,py(c.h)); ctx.lineTo(x,py(c.l)); ctx.stroke();
    // Candle body
    const by=py(Math.max(c.o,c.c)), bh=Math.max(1,Math.abs(py(c.o)-py(c.c)));
    ctx.fillStyle=col; ctx.fillRect(x-bw/2,by,bw,bh);
  });

  // x-axis labels — vertical (rotated -90°)
  if(labels && labels.length){
    const step = Math.max(1, Math.ceil((compact?9:10)/sw));
    const yBase = PT+pH+4;
    ctx.fillStyle=AX;
    ctx.font=`${FSZ}px JetBrains Mono,monospace`;
    ctx.textAlign='right'; ctx.textBaseline='middle';
    labels.forEach((lbl,i)=>{
      if(i%step!==0) return;
      const x=PL+i*sw+sw/2;
      ctx.save(); ctx.translate(x,yBase); ctx.rotate(-Math.PI/2);
      ctx.fillText(lbl,0,0); ctx.restore();
    });
    ctx.textBaseline='alphabetic';
  }
  return { pyInv, PT, pH };
}

// ─── DRAG LEVEL ON D1 ─────────────────────────────────────
let dragState = null; // {ticker, canvas, meta, candles, spyNorm, labels}

function attachDrag(canvasId, ticker, meta, candles, spyNorm, labels){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;

  // Remove old listeners by replacing canvas clone
  const clone = canvas.cloneNode(true);
  canvas.parentNode.replaceChild(clone, canvas);
  const c = document.getElementById(canvasId);

  function getLvlY(){
    const lvl = parseFloat(U[ticker].levelPrice);
    if(isNaN(lvl)) return null;
    return meta.PT + meta.pH - (lvl - getLoHi(candles, lvl).lo) / (getLoHi(candles, lvl).hi - getLoHi(candles, lvl).lo) * meta.pH;
  }

  function isNearLevel(mouseY){
    const lvl = parseFloat(U[ticker].levelPrice);
    if(isNaN(lvl) || !lvl) return false;
    // Use pyInv to find what price corresponds to mouse y, compare
    const priceAtMouse = meta.pyInv(mouseY);
    const lvlPrice = lvl;
    // near = within 8px
    const canvas = document.getElementById(canvasId);
    if(!canvas) return false;
    const W = canvas.clientWidth, H = canvas.clientHeight;
    const pxPerPrice = meta.pH / Math.abs(getLoHi(candles, lvl).hi - getLoHi(candles, lvl).lo);
    return Math.abs(mouseY - (meta.PT + meta.pH - (lvlPrice - getLoHi(candles, lvl).lo) / (getLoHi(candles, lvl).hi - getLoHi(candles, lvl).lo) * meta.pH)) < 10;
  }

  c.addEventListener('mousedown', e=>{
    const rect = c.getBoundingClientRect();
    const my = e.clientY - rect.top;
    const lvl = parseFloat(U[ticker].levelPrice);
    if(isNaN(lvl)||!lvl) return;
    // Check proximity to level line (within 10px)
    const lyPx = meta.PT + meta.pH*(1-(lvl-getRange(candles,lvl).lo)/(getRange(candles,lvl).hi-getRange(candles,lvl).lo));
    if(Math.abs(my - lyPx) > 12) return;
    e.preventDefault();
    dragState = {ticker, canvasId, meta, candles, spyNorm, labels};
    c.style.cursor = 'ns-resize';
  });

  c.addEventListener('mousemove', e=>{
    const rect = c.getBoundingClientRect();
    const my = e.clientY - rect.top;
    const lvl = parseFloat(U[ticker].levelPrice);

    if(dragState && dragState.canvasId === canvasId){
      // Dragging — update level
      const newPrice = meta.pyInv(my);
      const rounded  = Math.round(newPrice * 100) / 100;
      U[ticker].levelPrice = String(rounded);
      saveState();
      // Update input field
      const inp = document.querySelector('.inp[type="number"]');
      if(inp) inp.value = rounded;
      // Update ctl
      const el = document.getElementById('sb-ctl');
      if(el) el.textContent = closeToLevel(ticker);
      // Redraw D1 only (fast)
      drawChart(canvasId, 'cw-d1', candles, rounded, spyNorm, labels);
      // Redraw H1/M5 level too (debounced)
      clearTimeout(dragState._redrawT);
      dragState._redrawT = setTimeout(()=>{
        redrawAll(ticker);
      }, 80);
    } else {
      // Hover — show resize cursor near line
      if(!lvl||isNaN(lvl)){c.style.cursor='default';return;}
      const rng = getRange(candles, lvl);
      const lyPx = meta.PT + meta.pH*(1-(lvl-rng.lo)/(rng.hi-rng.lo));
      c.style.cursor = Math.abs(my-lyPx)<12 ? 'ns-resize' : 'default';
    }
  });

  c.addEventListener('mouseup', ()=>{
    if(dragState){ dragState=null; }
    c.style.cursor='default';
  });

  c.addEventListener('mouseleave', ()=>{
    if(dragState){ dragState=null; }
    c.style.cursor='default';
  });
}

// get hi/lo range same way as drawChart does
function getRange(candles, level){
  const hs=candles.map(c=>c.h), ls=candles.map(c=>c.l);
  if(level!=null){hs.push(level);ls.push(level);}
  let hi=Math.max(...hs), lo=Math.min(...ls);
  const rng=hi-lo; hi+=rng*0.08; lo-=rng*0.06;
  return {hi, lo};
}

  const el=document.getElementById(id);
  const isOpen=el.classList.contains('open');

  document.querySelectorAll('.dd-wrap.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen) el.classList.add('open');

function pickCrit(ticker, val){
  U[ticker].criteria = val;
  saveState();
  const valEl=document.getElementById("dd-crit-val");
  if(valEl) valEl.textContent = val;
  document.getElementById("dd-crit").classList.remove("open");
}

// ─── MARKET PHASE BLOCK ───────────────────────────────────
function buildMarketPhaseBlock(){
  // All times in ET (America/New_York)
  const now = new Date();
  const et  = new Date(now.toLocaleString('en-US', {timeZone:'America/New_York'}));
  const day = et.getDay(); // 0=Sun,6=Sat
  const mins = et.getHours()*60 + et.getMinutes();
  const isWeekday = day>=1 && day<=5;

  // Minutes from midnight ET
  const PRE_START  = 4*60;    // 04:00
  const MKT_START  = 9*60+30; // 09:30
  const MKT_END    = 16*60;   // 16:00
  const POST_END   = 20*60;   // 20:00
  const DAY_END    = 24*60;   // 24:00

  let phase, phaseColor, icon, label, sub;

  if(!isWeekday){
    phase='closed'; phaseColor='#4a5f73'; icon='🔴'; label='Закрыто';
    sub='Рынок закрыт (выходной)';
  } else if(mins < PRE_START){
    phase='closed'; phaseColor='#4a5f73'; icon='🔴'; label='Закрыто';
    const openIn = PRE_START - mins;
    sub=`Pre-market открывается через ${Math.floor(openIn/60)}ч ${openIn%60}мин`;
  } else if(mins < MKT_START){
    phase='pre'; phaseColor='#d4a017'; icon='🌅'; label='Pre-market';
    const openIn = MKT_START - mins;
    sub=`Основная сессия через ${Math.floor(openIn/60)}ч ${openIn%60}мин`;
  } else if(mins < MKT_END){
    phase='main'; phaseColor='#3ea96e'; icon='🟢'; label='Основная сессия';
    const closeIn = MKT_END - mins;
    sub=`Закрытие через ${Math.floor(closeIn/60)}ч ${closeIn%60}мин`;
  } else if(mins < POST_END){
    phase='post'; phaseColor='#8b6be8'; icon='🌆'; label='After-hours';
    const closeIn = POST_END - mins;
    sub=`Закрытие через ${Math.floor(closeIn/60)}ч ${closeIn%60}мин`;
  } else {
    phase='closed'; phaseColor='#4a5f73'; icon='🔴'; label='Закрыто';
    sub='Pre-market открывается в 04:00 ET';
  }

  // Timeline bar: 0–24h range, mark segments
  const pct = p => (p/DAY_END*100).toFixed(2)+'%';
  const cursorPct = Math.min(100,(mins/DAY_END*100)).toFixed(2)+'%';

  const timeStr = `${String(et.getHours()).padStart(2,'0')}:${String(et.getMinutes()).padStart(2,'0')}`;

  return `<div class="mkt-block">
    <div class="mkt-phase">
      <span class="mkt-icon">${icon}</span>
      <span class="mkt-label" style="color:${phaseColor}">${label}</span>
    </div>
    <div class="mkt-sub">${sub}</div>
    <div class="mkt-bar">
      <div class="mkt-seg" style="left:0;width:${pct(PRE_START)};background:#1a2332"></div>
      <div class="mkt-seg" style="left:${pct(PRE_START)};width:${pct(MKT_START-PRE_START)};background:#d4a01740"></div>
      <div class="mkt-seg" style="left:${pct(MKT_START)};width:${pct(MKT_END-MKT_START)};background:#3ea96e60"></div>
      <div class="mkt-seg" style="left:${pct(MKT_END)};width:${pct(POST_END-MKT_END)};background:#8b6be840"></div>
      <div class="mkt-seg" style="left:${pct(POST_END)};right:0;background:#1a2332"></div>
      <div class="mkt-cursor" style="left:${cursorPct}" title="${timeStr} ET"></div>
    </div>
    <div class="mkt-ticks">
      <span>00:00</span><span>04:00</span><span>09:30</span><span>16:00</span><span>20:00</span><span>24:00</span>
    </div>
    <div class="mkt-hours">
      <div class="mkt-row"><div class="mkt-dot" style="background:#d4a017"></div><span class="mkt-rname">Pre-market</span><span class="mkt-rtime">04:00 – 09:30</span></div>
      <div class="mkt-row"><div class="mkt-dot" style="background:#3ea96e"></div><span class="mkt-rname">Main market</span><span class="mkt-rtime">09:30 – 16:00</span></div>
      <div class="mkt-row"><div class="mkt-dot" style="background:#8b6be8"></div><span class="mkt-rname">After-hours</span><span class="mkt-rtime">16:00 – 20:00</span></div>
    </div>
    <div style="font-size:9px;color:var(--text3);margin-top:6px;font-family:var(--mono)">ET (America/New_York) · сейчас ${timeStr}</div>
  </div>`;
}

    const cur = filtered()[activeIdx];
    if(cur && cur.t === t) patchSidebar(t);
  }));
})();

window.addEventListener('resize', ()=>{
  const cur = filtered()[activeIdx];
  if(cur) redrawAll(cur.t);
});
</script>
